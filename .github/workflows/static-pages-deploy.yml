name: Deploy Next.js site to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6ef79739c512d0ecb3e2335935c21707ea80
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c245fae925e55c4f5d1e68a1618631d0faa
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm from package manager field
        run: corepack prepare pnpm@9.12.3 --activate

      - name: Cache pnpm store
        uses: actions/cache@a783357ca7e5d2d026693a87ee3899048d1ee872
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Next.js
        run: pnpm build

      - name: Upload generated site
        uses: actions/upload-pages-artifact@7b1f4a77235fd05ed6edcef21f3ad2c2a1201f44
        with:
          path: ./out

      - name: Build summary
        run: |
          echo "Build for branch: ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8beda85abf6cc2b0cd55498c1371becf642
