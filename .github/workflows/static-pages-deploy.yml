name: Deploy static content to Pages

on:
  # Automatic deploy on pushes is disabled intentionally.
  # To enable it again, uncomment the block below.
  # push:
  #   branches: ["main"]
  #   paths:
  #     - "src/**"
  #     - "messages/**"
  #     - "public/**"
  #     - "next.config.ts"
  #     - "package.json"
  #     - "pnpm-lock.yaml"
  #     - "tsconfig.json"
  #     - ".github/workflows/static-pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.should-deploy.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: should-deploy
        name: Check if deployment should run
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- \
            src messages public next.config.ts package.json pnpm-lock.yaml tsconfig.json .github/workflows/static-pages-deploy.yml \
            | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: detect
    if: needs.detect.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm from package manager field
        run: corepack prepare pnpm@9.12.3 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "Deployment URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
